services:
  db:
    image: postgres:17
    ports:
      - 5438:5432
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
  web:
    build: .
    image: django-web
    ports:
      - 8000:8000
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    command: python3 /app/manage.py runserver 0.0.0.0:8000

  redis:
    image: redis:8
    ports:
      - 6379:6379

  celery_worker:
    build: .
    image: celery_worker
    command: celery -A {{ project_name }} worker -l info
    env_file:
      - .env
    depends_on:
      - redis
      - db